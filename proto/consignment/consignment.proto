syntax = "proto3";

package consignment;

option go_package = "github.com/murraystewart96/shippy/proto/consignment";

enum ConsignmentStatus {
  PENDING = 0;
  CONFIRMED = 1;
  CANCELLED = 2;
}

message Consignment {
  string id = 1;
  string description = 2;
  int32 weight = 3;
  repeated Container containers = 4;
  string vessel_id = 5;
  ConsignmentStatus status = 6;
}

message Container {
  string id = 1;
  string customer_id = 2;
  string origin = 3;
  string user_id = 4;
}

message Response {
  bool created = 1;
  Consignment consignment = 2;
  repeated Consignment consignments = 3;
}

message GetRequest {}

message ConfirmRequest {
  string id = 1;
}

message ConfirmResponse {
  bool confirmed = 1;
}

service ConsignmentService {
  rpc CreateConsignment(Consignment) returns (Response);
  rpc ConfirmConsignment(ConfirmRequest) returns (ConfirmResponse);
  rpc GetConsignments(GetRequest) returns (Response);
}
