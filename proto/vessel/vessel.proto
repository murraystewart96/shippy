syntax = "proto3";

package vessel;

option go_package = "github.com/murraystewart96/shippy/proto/vessel";

message Vessel {
  string id = 1;
  int32 capacity = 2;
  int32 max_weight = 3;
  string name = 4;
  bool available = 5;
  string owner_id = 6;
  int32 reserved_weight = 7;
  int32 used_weight = 8;
  int32 reserved_capacity = 9;
  int32 used_capacity = 10;
}

message Specification {
  int32 weight = 1;
  int32 number_of_containers = 2;
  string reservation_id = 3;
}

message CapacityRequest {
  string vessel_id = 1;
  int32 weight = 2;
  int32 number_of_containers = 3;
  string reservation_id = 4;
}

message Empty {}

message Response {
  Vessel vessel = 1;
  repeated Vessel vessels = 2;
  bool created = 3;
}

service VesselService {
  rpc ReserveCapacity(Specification) returns (Response);
  rpc ReleaseCapacity(CapacityRequest) returns (Empty);
  rpc ConfirmCapacity(CapacityRequest) returns (Empty);
  rpc Create(Vessel) returns (Response);
}
