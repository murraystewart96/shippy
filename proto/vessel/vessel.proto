syntax = "proto3";

package vessel;

option go_package = "github.com/murraystewart96/shippy/proto/vessel";

message Vessel {
  string id = 1;
  int32 capacity = 2;
  int32 max_weight = 3;
  string name = 4;
  bool available = 5;
  string owner_id = 6;
  int32 reserved_weight = 7;
  int32 used_weight = 8;
}

message Specification {
  int32 capacity = 1;
  int32 max_weight = 2;
}

message Response {
  Vessel vessel = 1;
  repeated Vessel vessels = 2;
  bool created = 3;
}

service VesselService {
  rpc FindAvailable(Specification) returns (Response);
  rpc Create(Vessel) returns (Response);
}
