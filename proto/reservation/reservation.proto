syntax = "proto3";

package reservation;

option go_package = "github.com/murraystewart96/shippy/proto/reservation";

message ReserveCapacityRequest {
    string consignment_id = 1;
    int32 weight = 2;
    int32 number_of_containers = 3;
}

message ReservationResponse {
    string id = 1;
    bool reserved = 2;
    string vessel_id = 3;
}

message CapacityActionRequest {
    string id = 1;
}

message Empty {}

service ReservationService {
    rpc ReserveCapacity(ReserveCapacityRequest) returns (ReservationResponse);
    rpc ReleaseCapacity(CapacityActionRequest) returns (Empty);
    rpc ConfirmCapacity(CapacityActionRequest) returns (Empty);
    rpc RefreshReservation(CapacityActionRequest) returns (Empty);
}
