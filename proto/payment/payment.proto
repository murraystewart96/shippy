syntax = "proto3";

package payment;

option go_package = "github.com/murraystewart96/shippy/proto/payment";

enum PaymentStatus {
  AUTHORISED = 0;
  CAPTURED = 1;
  REFUNDED = 2;
  VOIDED = 3;
}

message AuthoriseRequest {
  string consignment_id  = 1;
  int64  amount          = 2;
  string currency        = 3;
  string idempotency_key = 4;
}

message AuthoriseResponse {
  string        auth_id = 1;
  PaymentStatus status  = 2;
}

message CaptureRequest {
  string auth_id         = 1;
  string idempotency_key = 2;
}

message CaptureResponse {
  string        payment_id = 1;
  PaymentStatus status     = 2;
}

message RefundRequest {
  string payment_id      = 1;
  string idempotency_key = 2;
}

message RefundResponse {
  string        refund_id = 1;
  PaymentStatus status    = 2;
}

message VoidRequest {
  string auth_id = 1;
}

message VoidResponse {
  PaymentStatus status = 1;
}

service PaymentService {
  rpc Authorise(AuthoriseRequest) returns (AuthoriseResponse);
  rpc Capture(CaptureRequest)    returns (CaptureResponse);
  rpc Refund(RefundRequest)      returns (RefundResponse);
  rpc Void(VoidRequest)          returns (VoidResponse);
}
