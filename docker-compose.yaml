# docker-compose.yml
services:

  # Services
  gateway:
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    ports:
      - 8080:8080
    environment:
      SERVER_ADDRESS: ":8080"
      USER_SERVICE_ADDRESS: "user:50051"
      CONSIGNMENT_SERVICE_ADDRESS: "consignment:50051"
      JWT_SECRET: "secret"
      OTEL_EXPORTER_OTLP_ENDPOINT: "tempo:4317"
    depends_on:
      - user
      - consignment
      - tempo

  consignment:
    restart: always
    build:
      context: .
      dockerfile: cmd/consignment-service/Dockerfile
    depends_on:
      datastore:
        condition: service_healthy
      reservation:
        condition: service_started
      payment:
        condition: service_started
      kafka:
        condition: service_healthy
      tempo:
        condition: service_started
    environment:
      GRPC_ADDRESS: ":50051"
      DB_HOST: "datastore"
      DB_PORT: "27017"
      RESERVATION_SERVICE_ADDRESS: "reservation:50051"
      PAYMENT_SERVICE_ADDRESS: "payment:50051"
      KAFKA_ADDRESS: "kafka:9092"
      OUTBOX_INTERVAL: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: "tempo:4317"
      METRICS_ADDRESS: ":9090"

  vessel:
    restart: always
    build:
      context: .
      dockerfile: cmd/vessel-service/Dockerfile
    ports:
      - 50052:50051
    environment:
      GRPC_ADDRESS: ":50051"
      DB_HOST: "datastore"
      DB_PORT: "27017"
    depends_on:
      datastore:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: cmd/payment-service/Dockerfile
    environment:
      GRPC_ADDRESS: ":50051"

  user:
    build:
      context: .
      dockerfile: cmd/user-service/Dockerfile
    ports:
      - 50053:50051
    environment:
      GRPC_ADDRESS: ":50051"
      DB_PASSWORD: "password"
      DB_USER: "admin"
      DB_NAME: "shippy"
      DB_HOST: "database"
      JWT_SECRET: "secret"
    depends_on:
      database:
        condition: service_healthy

  email:
    build:
      context: .
      dockerfile: cmd/email-service/Dockerfile
    environment:
      MICRO_BROKER: nats
      MICRO_BROKER_ADDRESS: nats:4222
    depends_on:
      - nats



  reservation:
    restart: always
    build:
      context: .
      dockerfile: cmd/reservation-service/Dockerfile
    ports:
      - 50054:50051
    environment:
      SHIPPY_ADDRESS: ":50051"
      SHIPPY_VESSEL_SERVICE_ADDRESS: "vessel:50051"
      SHIPPY_REDIS_ADDR: "reservation-redis:6379"
      SHIPPY_REDIS_RESERVATION_TTL: "180"        # 3 minute — short for testing
      SHIPPY_REDIS_RESERVATION_DATA_TTL: "300"  # 5 minutes
      SHIPPY_DATABASE_HOST: "reservation-db"
      SHIPPY_DATABASE_PORT: "5432"
      SHIPPY_DATABASE_NAME: "reservation"
      SHIPPY_DATABASE_USER: "reservation"
      SHIPPY_DATABASE_PASSWORD: "password"
      SHIPPY_KAFKA_PRODUCER_BOOTSTRAP_SERVERS: "kafka:9092"
      SHIPPY_KAFKA_PRODUCER_ACKS: "all"
      SHIPPY_KAFKA_CONSUMER_BOOTSTRAP_SERVERS: "kafka:9092"
      SHIPPY_KAFKA_CONSUMER_GROUP_ID: "reservation-service"
      SHIPPY_KAFKA_CONSUMER_OFFSET_RESET: "earliest"
      SHIPPY_MANAGER_CLEANUP_INTERVAL: "30"  # 30 seconds — short for testing
      SHIPPY_MANAGER_OUTBOX_INTERVAL: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: "tempo:4317"
      METRICS_ADDRESS: ":9090"
    depends_on:
      vessel:
        condition: service_started
      reservation-db:
        condition: service_healthy
      reservation-redis:
        condition: service_started
      kafka:
        condition: service_healthy
      tempo:
        condition: service_started

  reservation-db:
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: "password"
      POSTGRES_USER: "reservation"
      POSTGRES_DB: "reservation"
    ports:
      - 5433:5432
    volumes:
      - ./cmd/reservation-service/database/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservation -d reservation"]
      interval: 5s
      timeout: 5s
      retries: 10

  reservation-redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    ports:
      - 6379:6379

  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    ports:
      - 9091:9090
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yaml
    command: ["--config.file=/etc/prometheus/prometheus.yaml"]

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml
    ports:
      - 4317:4317    # OTLP gRPC
      - 3200:3200    # Tempo HTTP API

  grafana:
    image: grafana/grafana:latest
    ports:
      - 3000:3000
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/etc/grafana/dashboards
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    depends_on:
      - tempo

  # Message broker
  nats:
    image: nats
    ports:
      - 4222:4222

  # Database tier
  datastore:
    image: mongo
    container_name: "datastore"
    environment:
      - MONGO_DATA_DIR=/data/db
      - MONGO_LOG_DIR=/dev/null
    volumes:
      - ./data/db:/data/db # ensures data persistence between restarting
    ports:
      - 27017
    command: mongod --replSet rs0 --logpath=/dev/null
    healthcheck:
      test: mongosh --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'datastore:27017'}]}).ok }" --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: "password"
      POSTGRES_USER: "admin"
      POSTGRES_DB: "shippy"
      POSTGRES_HOST_AUTH_METHOD: "md5"
    ports:
      - 5432:5432
    volumes:
      - ./cmd/user-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d shippy"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Commands
  consignment-cli:
    build:
      context: .
      dockerfile: cmd/consignment-cli/Dockerfile
    profiles:
      - cli
    command: ["./consignment-cli", "consignment.json", "dummy-token"]
    environment:
      SERVICE_ADDRESS: "consignment:50051"
    depends_on:
      - consignment
    
  user-cli:
    build:
      context: .
      dockerfile: cmd/user-cli/Dockerfile
    profiles:
      - cli
