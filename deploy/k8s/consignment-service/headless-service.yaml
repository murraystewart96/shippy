apiVersion: v1
kind: Service
metadata:
  name: consignment-service-database
  labels:
    app: consignment-service-database
spec:
  selector:
    app: consignment-service-database
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      protocol: TCP
