apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-deployment
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: shippy-payment
        imagePullPolicy: Never
        ports:
        - containerPort: 50051
        env:
        - name: GRPC_ADDRESS
          value: ":50051"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "tempo:4317"
